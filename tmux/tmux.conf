# tmux — vim-friendly, carbonfox-themed, macOS + Linux.
# Symlinked to ~/.config/tmux/tmux.conf by bootstrap.sh.

# ── General ────────────────────────────────────────────────────────────
set -g  default-terminal "tmux-256color"
set -ag terminal-overrides ",*256col*:RGB,xterm-256color:RGB,alacritty:RGB"
set -g  mouse on
set -g  history-limit 50000
set -g  base-index 1
setw -g pane-base-index 1
set -g  renumber-windows on
set -sg escape-time 0            # no <Esc> delay — important for nvim
set -g  focus-events on
set -g  set-clipboard on         # let apps (nvim) set the clipboard via OSC 52
set -g  allow-passthrough on     # pass OSC 52 through to the terminal

# ── Prefix: C-a ────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix
bind -N "reload tmux.conf" r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"

# ── Splits (vim-style, keep current dir) ───────────────────────────────
unbind '"'
unbind %
bind -N "split right (current dir)" | split-window -h -c "#{pane_current_path}"
bind -N "split down (current dir)"  - split-window -v -c "#{pane_current_path}"
# Windows:
#   c     new window in the session default dir (tmux default behaviour)
#   M-c   set the session default dir to the current pane's dir (anchor here)
bind -N "new window (session default dir)"            c   new-window
bind -N "set session default dir to current pane dir" M-c attach-session -c "#{pane_current_path}"

# Merge another window into this one as a pane (prompts for the window number).
#   m → side-by-side (horizontal split)   M → stacked (vertical split)
# A bare window index ("2") isn't reliably scoped to the current session — tmux
# can match that index in another session and yank its window. The fix is the
# leading colon: ":2" means "window 2 of the CURRENT session". This must be a
# native command (not run-shell 'tmux …'): a nested tmux invocation has no
# current-session context and defaults to the wrong session.
bind -N "merge a window in beside this pane (left/right)" m command-prompt -p "merge window (h):" "join-pane -h -s ':%%'"
bind -N "merge a window in below this pane (top/bottom)"  M command-prompt -p "merge window (v):" "join-pane -v -s ':%%'"

# Switch this client to another session.
#   g → prompt for a session name   s → pick from the session tree (built-in)
#   ( / ) → previous / next session (built-in)
bind -N "go to a session by name" g command-prompt -p "switch to session:" "switch-client -t '%%'"

# ── Pane nav — seamless with nvim (vim-tmux-navigator) ─────────────────
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# Resize: prefix + H/J/K/L
bind -r -N "resize pane left"  H resize-pane -L 5
bind -r -N "resize pane down"  J resize-pane -D 5
bind -r -N "resize pane up"    K resize-pane -U 5
bind -r -N "resize pane right" L resize-pane -R 5
bind -r -N "next window"     C-n next-window
bind -r -N "previous window" C-p previous-window

# ── Copy mode — vi keys + system clipboard ─────────────────────────────
# Enter:   Ctrl-a v   (or Ctrl-a [)
# Select:  v   yank: y   rectangle: Ctrl-v   cancel: Esc
# Paste:   Ctrl-a ]
# Mouse:   drag to select — it auto-copies on release.
setw -g mode-keys vi
bind -N "enter copy mode"      v copy-mode
bind -N "paste from buffer"    ] paste-buffer -p
bind-key -T copy-mode-vi v   send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi Escape send-keys -X cancel

# Over SSH: rely on OSC 52 (set-clipboard on) so it reaches the *local* Mac.
# Locally: also pipe into the OS clipboard tool for robustness.
if-shell '[ -n "$SSH_CONNECTION" ]' {
    bind-key -T copy-mode-vi y                  send-keys -X copy-selection-and-cancel
    bind-key -T copy-mode-vi Enter              send-keys -X copy-selection-and-cancel
    bind-key -T copy-mode-vi MouseDragEnd1Pane  send-keys -X copy-selection-and-cancel
} {
    if-shell "uname | grep -q Darwin" {
        bind-key -T copy-mode-vi y                 send-keys -X copy-pipe-and-cancel "pbcopy"
        bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"
    } {
        if-shell '[ -n "$WAYLAND_DISPLAY" ]' {
            bind-key -T copy-mode-vi y                 send-keys -X copy-pipe-and-cancel "wl-copy"
            bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "wl-copy"
        } {
            bind-key -T copy-mode-vi y                 send-keys -X copy-pipe-and-cancel "xclip -se c -i"
            bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -se c -i"
        }
    }
}

# ── Carbonfox look ─────────────────────────────────────────────────────
# This is the static baseline. When nvim is running inside tmux it pushes the
# live colorscheme into these same options (see sync_tmux_theme in init.lua),
# so the bar/borders track whatever theme nvim is using.
set -g status-position top
set -g status-interval 5
set -g status-justify left
set -g status-style "bg=#161616,fg=#f2f4f8"
set -g status-left-length 30
set -g status-left "#[bg=#78a9ff,fg=#161616,bold] #S #[bg=#161616]"
set -g status-right-length 60
set -g status-right "#{?client_prefix,#[fg=#ee5396]PREFIX ,}#[fg=#33b1ff]%a %d %b #[fg=#78a9ff]%H:%M "
setw -g window-status-format         "#[fg=#6b6b6b] #I #W "
setw -g window-status-current-format "#[bg=#2a2a2a,fg=#78a9ff,bold] #I #W "
setw -g window-status-separator ""
set -g pane-border-style        "fg=#2a2a2a"
set -g pane-active-border-style "fg=#78a9ff"
set -g message-style            "bg=#2a2a2a,fg=#f2f4f8"
set -g mode-style               "bg=#78a9ff,fg=#161616"

# Dim inactive panes so the focused one stands out.
set -g window-style        "fg=#8d8d8d,bg=#0d0d0d"
set -g window-active-style "fg=#f2f4f8,bg=#161616"
