# tmux — vim-friendly, carbonfox-themed, macOS + Linux.
# Symlinked to ~/.config/tmux/tmux.conf by bootstrap.sh.

# ── General ────────────────────────────────────────────────────────────
set -g  default-terminal "tmux-256color"
set -ag terminal-overrides ",*256col*:RGB,xterm-256color:RGB,alacritty:RGB"
set -g  mouse on
set -g  history-limit 50000
set -g  base-index 1
setw -g pane-base-index 1
set -g  renumber-windows on
set -sg escape-time 0            # no <Esc> delay — important for nvim
set -g  focus-events on

# ── Prefix: C-a ────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"

# ── Splits (vim-style, keep current dir) ───────────────────────────────
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window     -c "#{pane_current_path}"

# ── Pane nav — seamless with nvim (vim-tmux-navigator) ─────────────────
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# Resize: prefix + H/J/K/L
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r C-n next-window
bind -r C-p previous-window

# ── Copy mode — vi keys + system clipboard ─────────────────────────────
setw -g mode-keys vi
bind v copy-mode
bind-key -T copy-mode-vi v   send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi Escape send-keys -X cancel
if-shell "uname | grep -q Darwin" {
    bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
} {
    if-shell '[ -n "$WAYLAND_DISPLAY" ]' {
        bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
    } {
        bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -se c -i"
    }
}

# ── Carbonfox look ─────────────────────────────────────────────────────
set -g status-position top
set -g status-interval 5
set -g status-justify left
set -g status-style "bg=#161616,fg=#f2f4f8"
set -g status-left-length 30
set -g status-left "#[bg=#78a9ff,fg=#161616,bold] #S #[bg=#161616]"
set -g status-right-length 60
set -g status-right "#{?client_prefix,#[fg=#ee5396]PREFIX ,}#[fg=#33b1ff]%a %d %b #[fg=#78a9ff]%H:%M "
setw -g window-status-format         "#[fg=#6b6b6b] #I #W "
setw -g window-status-current-format "#[bg=#2a2a2a,fg=#78a9ff,bold] #I #W "
setw -g window-status-separator ""
set -g pane-border-style        "fg=#2a2a2a"
set -g pane-active-border-style "fg=#78a9ff"
set -g message-style            "bg=#2a2a2a,fg=#f2f4f8"
set -g mode-style               "bg=#78a9ff,fg=#161616"
